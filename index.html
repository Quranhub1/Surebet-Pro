<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JOESBET PREDICTOR | Multi-Agent Intelligence</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;700;900&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #030712; color: #f3f4f6; overflow-x: hidden; }
        h1, h2, h3, .brand { font-family: 'Lexend', sans-serif; }
        .glass { background: rgba(17, 24, 39, 0.7); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .sidebar-item-active { background: linear-gradient(90deg, rgba(59, 130, 246, 0.2) 0%, transparent 100%); border-left: 4px solid #3b82f6; color: #60a5fa; font-weight: 700; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #1f2937; border-radius: 10px; }
        .glow-btn { box-shadow: 0 0 20px rgba(59, 130, 246, 0.4); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        function App() {
            const [matches, setMatches] = useState([]);
            const [loading, setLoading] = useState(false);
            const [sidebarOpen, setSidebarOpen] = useState(false);

            const runEngine = async () => {
                setLoading(true);
                try {
                    const res = await fetch('/api/football-data/matches');
                    if (!res.ok) {
                        const err = await res.json();
                        alert("API Error: " + err.error);
                        setLoading(false);
                        return;
                    }
                    const json = await res.json();
                    // Get up to 100 matches
                    const topGames = (json.matches || []).slice(0, 100);
                    
                    const payload = topGames.map(m => ({
                        id: m.id, homeTeam: m.homeTeam.name, awayTeam: m.awayTeam.name,
                        homeId: m.homeTeam.id, awayId: m.awayTeam.id, league: m.competition.name
                    }));

                    const aiRes = await fetch('/api/predict-batch', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({ matches: payload })
                    });
                    const aiData = await aiRes.json();
                    setMatches(topGames.map(m => ({ ...m, ai: aiData.find(p => p.id === m.id) || {} })));
                } catch (e) { 
                    alert("Connect Error: " + e.message); 
                }
                setLoading(false);
            };

            return (
                <div className="flex flex-col min-h-screen relative">
                    
                    {/* TOP BAR */}
                    <div className="glass fixed top-0 w-full z-50 px-4 py-3 flex justify-between items-center">
                        <h1 className="brand font-black text-lg tracking-tighter">JOESBET <span className="text-blue-500">AI</span></h1>
                        <button onClick={runEngine} disabled={loading} className="bg-blue-600 hover:bg-blue-500 px-4 py-2 rounded-xl font-black text-xs uppercase tracking-widest glow-btn disabled:opacity-50">
                            {loading ? <i className="fas fa-spinner animate-spin"></i> : <i className="fas fa-microchip mr-2"></i>}
                            {loading ? "Loading..." : "RUN"}
                        </button>
                    </div>

                    {/* MAIN TABLE */}
                    <main className="flex-1 pt-16 p-4">
                        
                        {matches.length === 0 && !loading && (
                            <div className="py-32 text-center opacity-20">
                                <i className="fas fa-futbol text-6xl mb-4"></i>
                                <h3 className="text-xl font-bold">Press RUN to load predictions</h3>
                            </div>
                        )}

                        {matches.length > 0 && (
                            <div className="overflow-x-auto">
                                <table className="w-full text-sm">
                                    <thead>
                                        <tr className="border-b border-gray-800 text-gray-400 text-xs uppercase tracking-widest">
                                            <th className="text-left py-3 px-2">League</th>
                                            <th className="text-left py-3 px-2">Home</th>
                                            <th className="text-left py-3 px-2">Away</th>
                                            <th className="text-center py-3 px-2">Score</th>
                                            <th className="text-center py-3 px-2">Confidence</th>
                                            <th className="text-left py-3 px-2">Verdict</th>
                                            <th className="text-left py-3 px-2 hidden md:table-cell">Logic</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {matches.map((m, i) => (
                                            <tr key={m.id} className="border-b border-gray-800/50 hover:bg-gray-800/30">
                                                <td className="py-3 px-2 text-blue-500 text-xs font-bold">{m.competition?.name || 'N/A'}</td>
                                                <td className="py-3 px-2 font-medium">{m.homeTeam?.name || 'TBD'}</td>
                                                <td className="py-3 px-2 font-medium">{m.awayTeam?.name || 'TBD'}</td>
                                                <td className="py-3 px-2 text-center font-black text-lg text-blue-400">{m.ai?.score || '--'}</td>
                                                <td className="py-3 px-2 text-center">
                                                    <span className={`font-bold ${(m.ai?.confidence || 0) > 75 ? 'text-green-400' : 'text-blue-400'}`}>
                                                        {m.ai?.confidence || 0}%
                                                    </span>
                                                </td>
                                                <td className="py-3 px-2">
                                                    <span className="bg-gray-800 px-2 py-1 rounded text-xs font-bold uppercase">
                                                        {m.ai?.verdict || 'Waiting'}
                                                    </span>
                                                </td>
                                                <td className="py-3 px-2 text-gray-400 text-xs hidden md:table-cell">{m.ai?.logic || '-'}</td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        )}

                        {matches.length > 0 && (
                            <div className="text-center py-4 text-gray-500 text-xs">
                                Showing {matches.length} matches
                            </div>
                        )}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
