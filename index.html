<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JOESBET PREDICTOR | Multi-Agent AI</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;700;900&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #030712; color: #f3f4f6; }
        .brand { font-family: 'Lexend', sans-serif; }
        .glass { background: rgba(17, 24, 39, 0.8); backdrop-filter: blur(10px); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const [matches, setMatches] = useState([]);
            const [loading, setLoading] = useState(false);
            const [progress, setProgress] = useState({ total: 0, processed: 0, isProcessing: false });

            const loadPredictions = async () => {
                try {
                    const res = await fetch('/api/predictions');
                    const data = await res.json();
                    setMatches(data.predictions || []);
                    setProgress({ total: data.total, processed: data.processed, isProcessing: data.isProcessing });
                } catch (e) { console.error(e); }
            };

            const startPrediction = async () => {
                setLoading(true);
                try {
                    await fetch('/api/start-predictions', { method: 'POST' });
                } catch (e) { alert("Error: " + e.message); }
                setLoading(false);
            };

            // Poll for updates
            useEffect(() => {
                const interval = setInterval(loadPredictions, 3000);
                return () => clearInterval(interval);
            }, []);

            // Get status badge
            const getStatusBadge = (status) => {
                const styles = {
                    'SCHEDULED': 'bg-gray-700 text-gray-300',
                    'IN_PLAY': 'bg-green-600 text-white animate-pulse',
                    'PAUSED': 'bg-yellow-600 text-white',
                    'FINISHED': 'bg-blue-600 text-white',
                    'POSTPONED': 'bg-red-600 text-white',
                    'SUSPENDED': 'bg-orange-600 text-white'
                };
                return styles[status] || 'bg-gray-700 text-gray-300';
            };

            return (
                <div className="min-h-screen">
                    {/* HEADER */}
                    <div className="glass fixed top-0 w-full z-50 px-4 py-3 flex justify-between items-center border-b border-gray-800">
                        <h1 className="brand font-black text-lg">JOESBET <span className="text-blue-500">AI</span></h1>
                        <div className="flex items-center gap-4">
                            {progress.isProcessing && (
                                <span className="text-xs text-yellow-500">
                                    {progress.processed}/{progress.total} processed
                                </span>
                            )}
                            <button onClick={startPrediction} disabled={loading || progress.isProcessing} 
                                className="bg-blue-600 hover:bg-blue-500 px-4 py-2 rounded-lg font-bold text-sm disabled:opacity-50">
                                {loading ? 'Starting...' : progress.isProcessing ? 'Processing...' : 'START 200'}
                            </button>
                        </div>
                    </div>

                    {/* MAIN TABLE */}
                    <div className="pt-16 p-4">
                        {matches.length === 0 && !progress.isProcessing && (
                            <div className="text-center py-20 opacity-50">
                                <i className="fas fa-futbol text-5xl mb-4"></i>
                                <p className="text-xl">Press START to begin predictions</p>
                            </div>
                        )}

                        {matches.length > 0 && (
                            <div className="overflow-x-auto">
                                <table className="w-full text-xs">
                                    <thead>
                                        <tr className="border-b border-gray-700 text-gray-400 uppercase tracking-wider">
                                            <th className="py-2 px-2 text-left">Time</th>
                                            <th className="py-2 px-2 text-left">League</th>
                                            <th className="py-2 px-2 text-left">Home</th>
                                            <th className="py-2 px-2 text-left">Away</th>
                                            <th className="py-2 px-2 text-center">Score</th>
                                            <th className="py-2 px-2 text-center">Conf</th>
                                            <th className="py-2 px-2 text-center">DC</th>
                                            <th className="py-2 px-2 text-center">O/U</th>
                                            <th className="py-2 px-2 text-center">BTTS</th>
                                            <th className="py-2 px-2 text-center">HC</th>
                                            <th className="py-2 px-2 text-center">Pick</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {matches.filter(m => m.homeTeam && m.awayTeam && typeof m.homeTeam === 'string').map(m => (
                                            <tr key={m.id} className="border-b border-gray-800 hover:bg-gray-800/50">
                                                <td className="py-2 px-2">
                                                    <span className={`px-2 py-1 rounded text-xs font-bold ${getStatusBadge(m.status)}`}>
                                                        {m.status}
                                                    </span>
                                                    <div className="text-gray-500 mt-1 text-[10px]">{m.date}</div>
                                                </td>
                                                <td className="py-2 px-2 text-blue-400 font-bold">{m.league}</td>
                                                <td className="py-2 px-2 font-medium">{m.homeTeam}</td>
                                                <td className="py-2 px-2 font-medium">{m.awayTeam}</td>
                                                <td className="py-2 px-2 text-center font-black text-blue-400">{m.ai?.score}</td>
                                                <td className="py-2 px-2 text-center">
                                                    <span className={`font-bold ${(m.ai?.confidence || 0) > 75 ? 'text-green-400' : 'text-blue-400'}`}>
                                                        {m.ai?.confidence || 0}%
                                                    </span>
                                                </td>
                                                <td className="py-2 px-2 text-center">{m.ai?.doubleChance || '-'}</td>
                                                <td className="py-2 px-2 text-center">{m.ai?.overUnder || '-'}</td>
                                                <td className="py-2 px-2 text-center">{m.ai?.btts || '-'}</td>
                                                <td className="py-2 px-2 text-center">{m.ai?.handicap || '-'}</td>
                                                <td className="py-2 px-2 text-center">
                                                    <span className="bg-blue-600 px-2 py-1 rounded font-bold">{m.ai?.verdict || '-'}</span>
                                                </td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        )}

                        {progress.processed > 0 && (
                            <div className="text-center py-4 text-gray-500 text-sm">
                                Showing {matches.length} successful predictions
                                {progress.failedCount > 0 && ` (${progress.failedCount} failed, filtered out)`}
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
